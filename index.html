<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
	<link rel="stylesheet" href="style.css" type="text/css"> 
	
	<title>Intro component with sign up form</title>

</head>
<body>
	<!-- HEADER -->
	<head>

	</head>

	<!-- MAIN -->
	<main>
		<div class="main__container">
			<div class="main__grid1">
				<h1>Learn to code by watching others</h1>
				<h3> See how experienced developers solve problems in real-time. Watching scripted tutorials is great, but understanding how developers think is invaluable.</h3>
			</div>
			<div class="main__grid2">
				<h3><strong>Try it free 7 days</strong> then $20/mo. thereafter</h3>
				<form class="grid2__signup" novalidate>
					<div class="form-group">
						<label for="firstName"></label>
						<img class="error-icon hide-icon" src="/images/icon-error.svg" alt="" aria-hidden="true">
						<input id="firstName" type="text" name="firstName" placeholder="First Name" required/>
						<span class="error-message"></span>
					</div>
					
					<div class="form-group">
						<label for="lastName"></label>
						<img class="error-icon hide-icon" src="/images/icon-error.svg" alt="" aria-hidden="true">
						<input id="lastName" type="text" name="lastName" placeholder="Last Name" required/>
						<span class="error-message"></span>
					</div>
					
					<div class="form-group">
						<label for="emailAddress"></label>
						<img class="error-icon hide-icon" src="/images/icon-error.svg" alt="" aria-hidden="true">
						<input id="emailAddress" type="email" name="emailAddress" placeholder="Email Address" required/>
						<span class="error-message"></span>
					</div>
					
					<div class="form-group">
						<label for="password"></label>
						<img class="error-icon hide-icon" src="/images/icon-error.svg" alt="" aria-hidden="true">
						<input id="password" type="password" name="password" placeholder="Password" required/>
						<span class="error-message"></span>
					</div>
					

					<button type="submit" class="signupbtn">CLAIM YOUR FREE TRIAL</button>

					<p>By clicking the button, you are agreeing to our <span>Terms and Services</span></p>
				</form>
			</div>
		</div>
		
	</main>

	<!-- FOOTER -->
	<footer>
	
	</footer>
	<script src="form.js" type="text/javascript"></script>
</body>
</html>
